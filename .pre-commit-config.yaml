# Pre-commit configuration.
#
# Run `pre-commit autoupdate` periodically to refresh the pinned versions.
# The repo's git hook is installed via `pre-commit install`, so any
# `git commit` invokes the hooks listed below.
#
# Tooling
# -------
# Lint + format: ruff via the upstream pre-commit hook (isolated venv).
# Secret scan:   detect-secrets. The .secrets.baseline file lists known-safe
#                pre-existing findings; new commits may not introduce
#                findings outside that baseline.
# Type check:    ty (Astral). Run as a local hook through `uv run ty check`,
#                so it picks up the version pinned in pyproject.toml /
#                uv.lock and stays consistent across contributors.

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: package-lock.json

  - repo: local
    hooks:
      - id: ty
        name: ty
        entry: uv run ty check
        language: system
        types: [python]
        pass_filenames: false
